<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Pyxel Syntax</title>

<style>

/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
  min-height:105vh;
}
}

/* ================= NAVBAR ================= */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px)
}


.logo{
  font-weight:bold;
  font-size:25px;
  background:linear-gradient(90deg,#00f7ff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 10px rgba(0,247,255,0.4);
}

.navbar{
  padding:20px 40px;
  backdrop-filter:blur(10px);
}

.nav-links{
  gap:30px;
}

.nav-links a{
  position:relative;
}

.nav-links a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-5px;
  left:0;
  background:#00f7ff;
  transition:0.3s;
}

.nav-links a:hover::after{
  width:100%;
}

/* MOBILE NAV */
.menu-btn{
  display:none;
}

.mobile-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:70%;
  height:100%;
  background:black;
  padding:40px;
  transition:0.4s;
}

.mobile-menu.active{
  right:0;
}

/* ================= TITLE ================= */
.title{
  text-align:center;
  margin-top:30px;
}

/* ================= FILTER ================= */
.filter-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
}

.filter-buttons button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  cursor:pointer;
}

.filter-buttons button:hover{
  background:#00f7ff;
  color:black;
}
.visit-btn{
  display:block;
  margin:10px auto 15px;
  width:80%;
  text-align:center;
  padding:10px;
  border-radius:20px;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#7b2ff7,#00c6ff);
  transition:0.3s;
}

.visit-btn:hover{
  box-shadow:0 0 15px #00f7ff;
  transform:scale(1.05);
}

 @media(min-width:769px){

  .card.web{
    display:flex;
    flex-direction:column;
    height:270px;   /* adjust if needed */
  }

  .card.web img{
    height:150px;
    object-fit:cover;
  }

  .visit-btn{
    margin-top:auto;
    width:80%;
    padding:8px;
    font-size:13px;
  }

}
  
/* ================= GRID ================= */
.portfolio-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}
section{
  padding-bottom:40px;
}
/* ================= CARD ================= */
.card{
  background:#111;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s ease;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00f7ff;
}

.card img,
.card iframe{
  width:100%;
  height:200px;
}

.card h3{
  text-align:center;
}

/* ================= POPUP ================= */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.popup img,
.popup iframe{
  width:90%;
  max-height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .nav-links{
    display:none;
  }

  .menu-btn{
    display:block;
    font-size:25px;
    cursor:pointer;
  }

}
@media(max-width:768px){

  .card.web{
    height:auto;   /* important */
  }

  .card.web img{
    height:140px;
  }

  .visit-btn{
    width:90%;
    font-size:12px;
    padding:7px;
  }

}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

<div class="logo">PYXEL SYNTAX</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="portfolio.html">Portfolio</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

<div class="menu-btn" id="openMenu">☰</div>

<div class="mobile-menu" id="mobileMenu">
<div class="close" id="closeMenu">✖</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="portfolio.html">Portfolio</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</div>

</nav>

<!-- PORTFOLIO -->
<section>

<h1 class="title">My Portfolio</h1>

<div class="filter-buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('web')">Websites</button>
<button onclick="filterSelection('edit')">Video Edits</button>
</div>

<div class="portfolio-grid">

<div class="card web">

  <img src="media/image/beauty-parlor.png">

  <h3>Your Project Name</h3>

  <a href="https://shxbhgamer.github.io/Just-for-you/" target="_blank" class="visit-btn">
    Visit Website 🚀
  </a>

</div>

<div class="card edit" onclick="openVideo('https://www.youtube.com/embed/5ov7LDxVhc4')">
<iframe src="https://www.youtube.com/embed/5ov7LDxVhc4"></iframe>
<h3>Car Edit</h3>
</div>

<div class="card edit" onclick="openVideo('https://www.youtube.com/embed/9YeI_D0GPuI')">
<iframe src="https://www.youtube.com/embed/9YeI_D0GPuI"></iframe>
<h3>Car Edit</h3>
</div>

<div class="card edit" onclick="openVideo('https://www.youtube.com/embed/1V1VuYrfn5A')">
<iframe src="https://www.youtube.com/embed/1V1VuYrfn5A"></iframe>
<h3>Anime Edit</h3>
</div>

<div class="card edit" onclick="openVideo('https://www.youtube.com/embed/lv4-_w6rfEo')">
<iframe src="https://www.youtube.com/embed/lv4-_w6rfEo"></iframe>
<h3>Movie Edit</h3>
</div>

</div>

</section>

<!-- IMAGE POPUP -->
<div class="popup" id="imagePopup">
<span class="close" onclick="closePopup('imagePopup')">&times;</span>
<img id="popupImage">
</div>

<!-- VIDEO POPUP -->
<div class="popup" id="videoPopup">
<span class="close" onclick="closePopup('videoPopup')">&times;</span>
<iframe id="popupVideo"></iframe>
</div>

<!-- JS -->
<script>

/* NAV */
const openMenu = document.getElementById("openMenu")
const closeMenu = document.getElementById("closeMenu")
const mobileMenu = document.getElementById("mobileMenu")

openMenu.onclick = () => mobileMenu.classList.add("active")
closeMenu.onclick = () => mobileMenu.classList.remove("active")
/* FILTER */
function filterSelection(category){
  let cards = document.querySelectorAll(".card")

  cards.forEach(card => {
    if(category === "all" || card.classList.contains(category)){
      card.style.display = ""   // ✅ BEST FIX
    } else {
      card.style.display = "none"
    }
  })
}

/* POPUPS */
function openImage(src){
  document.getElementById("popupImage").src = src
  document.getElementById("imagePopup").style.display="flex"
}

function openVideo(src){
  document.getElementById("popupVideo").src = src
  document.getElementById("videoPopup").style.display="flex"
}

function closePopup(id){
  document.getElementById(id).style.display="none"
  document.getElementById("popupVideo").src=""
}

</script>

</body>
</html>
