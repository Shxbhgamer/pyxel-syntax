<!-- SERVICES SECTION -->
<section class="page">

<h1>Services</h1>

<div class="services">

  <div class="service-card" onclick="openPopup('Website Development','I build modern responsive websites with animations and smooth UI/UX.')">
    <h3>Website Development</h3>
    <p>Modern responsive websites</p>
  </div>

  <div class="service-card" onclick="openPopup('Video Editing','Professional cinematic edits, reels, and YouTube videos.')">
    <h3>Video Editing</h3>

  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- MOBILE MENU SCRIPT -->
<script>
const openMenu = document.getElementById("openMenu")
const closeMenu = document.getElementById("closeMenu")
const mobileMenu = document.getElementById("mobileMenu")

openMenu.addEventListener("click", () => {
  mobileMenu.classList.add("active")
})

closeMenu.addEventListener("click", () => {
  mobileMenu.classList.remove("active")
})
</script>

<!-- POPUP SCRIPT -->
<script>
function openPopup(title,text){
  document.getElementById("popupTitle").innerText = title
  document.getElementById("popupText").innerText = text
  document.getElementById("popup").style.display = "flex"
}

function closePopup(){
  document.getElementById("popup").style.display = "none"
}
</script>
